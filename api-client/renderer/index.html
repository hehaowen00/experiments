<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
  <link rel="stylesheet" href="styles.css">
  <title>API Client</title>
</head>
<body>
  <div class="landing">
    <h1>API Client</h1>
    <p class="subtitle">Organize and send HTTP requests</p>
    <div class="toolbar">
      <input type="text" id="new-name" placeholder="New collection name..." />
      <button class="btn btn-primary" id="create-btn">Create</button>
    </div>
    <div id="collections" class="collection-list"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title" id="modal-title"></div>
      <input type="text" class="modal-input" id="modal-input" />
      <div class="modal-buttons">
        <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-ok">OK</button>
      </div>
    </div>
  </div>

  <!-- Confirm modal -->
  <div class="modal-overlay" id="confirm-overlay">
    <div class="modal">
      <div class="modal-title" id="confirm-title"></div>
      <div class="modal-buttons">
        <button class="btn btn-ghost" id="confirm-cancel">Cancel</button>
        <button class="btn btn-danger" id="confirm-ok">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
